name: Build MSI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
  workflow_dispatch:

permissions:
  contents: read

env:
  Configuration: Release

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: src/OfficeAgent.Frontend/package-lock.json

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Install mock server dependencies
        run: cd tests/mock-server && npm install

      - name: Run unit tests
        run: |
          dotnet test tests/OfficeAgent.Core.Tests/OfficeAgent.Core.Tests.csproj --verbosity minimal
          dotnet test tests/OfficeAgent.Infrastructure.Tests/OfficeAgent.Infrastructure.Tests.csproj --verbosity minimal

      - name: Run integration tests
        run: dotnet test tests/OfficeAgent.IntegrationTests/OfficeAgent.IntegrationTests.csproj --verbosity minimal

      - name: Stage VSTO runtime redistributable
        shell: pwsh
        run: |
          $prereqRoot = Join-Path $env:GITHUB_WORKSPACE 'installer/OfficeAgent.SetupBundle/prereqs'
          New-Item -ItemType Directory -Force -Path $prereqRoot | Out-Null

          $vstoInstaller = Join-Path $prereqRoot 'vstor_redist.exe'
          $vstoUrl = 'https://download.microsoft.com/download/5/d/2/5d24f8f8-efbb-4b63-aa33-3785e3104713/vstor_redist.exe'
          $expectedHash = 'CFE1A40BBE4A50022DB2164ABDB0154984E2CECB761A23CDC81CB5754F6E0A18'

          Invoke-WebRequest -Uri $vstoUrl -OutFile $vstoInstaller
          $actualHash = (Get-FileHash -Algorithm SHA256 -LiteralPath $vstoInstaller).Hash.ToUpperInvariant()

          if ($actualHash -ne $expectedHash) {
            throw "Unexpected vstor_redist.exe SHA256. Expected $expectedHash, got $actualHash."
          }

      - name: Build installer
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File "installer/OfficeAgent.Setup/build.ps1"

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v6
        with:
          name: xISDP-Installer-${{ github.sha }}
          path: |
            artifacts/installer/*.exe
            artifacts/installer/*.msi
          retention-days: 30
